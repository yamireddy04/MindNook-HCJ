<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="canvas.css">
    <link rel="icon" type="image/x-icon" href="./images/mindnook-logo.ico">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Fix #1: Supabase CDN was missing from canvas.html -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>MindNook | Canvas Editor</title>
</head>
<body>

    <div id="picker-view" class="canvas-picker-view">
        <h1 class="picker-headline">Select Your Canvas</h1>
        <div class="canvas-grid" id="canvas-grid"></div>
        <div class="picker-footer-nav">
            <a href="index.html" style="text-decoration: none;">
                <button class="nav-btn secondary">Return to Home</button>
              </a>
            <button id="start-writing" class="nav-btn primary disabled" disabled>Start Writing →</button>
        </div>
    </div>

    <div id="editor-view" class="editor-view" style="display: none;">
        <div class="editor-top-nav">
            <button class="nav-action-btn" id="back-btn">← Back</button>
            <span class="canvas-badge" id="badge"></span>
            <button class="nav-action-btn primary" id="save-btn">Save & Analyze ✓</button>
        </div>
        <div class="paper-container">
            <div id="editor"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="canvas.js"></script>

    <!-- Fix #3: Modal moved inside body properly, class changed from "hidden" to inline style -->
    <!-- Fix #3: closeModal() button now calls the function defined in canvas.js -->
    <div id="analysis-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:999;">
        <div class="modal-content" style="background:#1b2e2b; border:1px solid #d9c5b2; border-radius:16px; padding:40px; max-width:480px; width:90%; text-align:center; color:#f0ece2;">
            <h2 id="sentiment-title" style="font-family:'Playfair Display',serif; margin-bottom:16px;"></h2>
            <p id="mood-lifter-text" style="color:rgba(240,236,226,0.8); margin-bottom:28px; line-height:1.6;"></p>
            <button onclick="closeModal()" style="background:#d9c5b2; color:#0d1a18; border:none; padding:12px 32px; border-radius:50px; font-weight:600; cursor:pointer;">Continue to Vocab Dashboard</button>
        </div>
    </div>

</body>
</html>
